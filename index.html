<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6C63FF" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gym Trainer" />
  <meta name="description"
    content="Gym Trainer — App de gestión para entrenadores y sus clientes. Creada por Marcos José Simé Bremont." />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/LogoGymTrainerSVG.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/LogoGymTrainerSVG.svg" />
  <link rel="stylesheet" href="css/style.css" />

  <title>Gym Trainer</title>
</head>

<body>

  <!-- ===== AUTH SCREEN ===== -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-container">
      <div class="auth-logo">
        <img src="assets/LogoGymTrainerSVG.svg" alt="Gym Trainer" style="width:160px;margin-bottom:8px" />
        <p class="logo-subtitle">Tu plataforma de entrenamiento personal</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Iniciar Sesión</button>
          <button class="auth-tab" data-tab="register">Crear Cuenta</button>
        </div>

        <!-- Login Tab -->
        <div id="tab-login" class="tab-content active">
          <form id="login-form" class="auth-form">
            <div class="form-group">
              <label>Correo electrónico</label>
              <input type="email" id="login-email" placeholder="correo@ejemplo.com" autocomplete="email" required />
            </div>
            <div class="form-group">
              <label>Contraseña</label>
              <div class="password-wrap">
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
                  required />
                <button type="button" class="toggle-pw" onclick="togglePassword('login-password')">👁</button>
              </div>
            </div>
            <p id="login-error" class="form-error hidden"></p>
            <button type="submit" class="btn btn-primary btn-full">Entrar</button>
          </form>
        </div>

        <!-- Register Tab -->
        <div id="tab-register" class="tab-content">
          <form id="register-form" class="auth-form">
            <div class="form-group">
              <label>Nombre completo *</label>
              <input type="text" id="reg-name" placeholder="Tu nombre completo" autocomplete="name" required />
            </div>
            <div class="form-group">
              <label>Correo electrónico *</label>
              <input type="email" id="reg-email" placeholder="correo@ejemplo.com" autocomplete="email" required />
            </div>
            <div class="form-group">
              <label>Contraseña *</label>
              <div class="password-wrap">
                <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" minlength="6"
                  autocomplete="new-password" required />
                <button type="button" class="toggle-pw" onclick="togglePassword('reg-password')">👁</button>
              </div>
            </div>
            <div class="form-group">
              <label>Soy... *</label>
              <select id="reg-role" required onchange="app.onRegRoleChange(this.value)">
                <option value="">Seleccionar tipo de cuenta…</option>
                <option value="trainer">🏋️ Entrenador / Trainer</option>
                <option value="client">💪 Cliente</option>
              </select>
            </div>
            <div id="reg-trainer-group" class="form-group hidden">
              <label>Mi entrenador *</label>
              <select id="reg-trainer">
                <option value="">Selecciona tu rol primero…</option>
              </select>
            </div>
            <p id="reg-error" class="form-error hidden"></p>
            <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
          </form>
        </div>
      </div>

      <p class="auth-footer" id="app-version-footer">v1.3.20 · Gym Trainer · Creado por Marcos José Simé Bremont</p>
    </div>
  </div>

  <!-- ===== APP SHELL ===== -->
  <div id="app-shell" class="app-shell hidden">

    <!-- Top Header -->
    <header class="app-header" id="app-header">
      <div class="header-left">
        <button class="btn-icon" id="menu-btn" onclick="app.toggleSidebar()">☰</button>
        <span class="header-logo"><img src="assets/LogoGymTrainerSVG.svg" alt="Gym Trainer"
            style="height:80px;vertical-align:middle" /></span>
      </div>
      <div class="header-right">
        <button class="btn-icon notif-btn" id="notif-btn" onclick="app.showNotifications()">
          🔔 <span class="notif-badge hidden" id="notif-count">0</span>
        </button>
        <div class="user-avatar" id="header-avatar" onclick="app.navigate('perfil')"></div>
      </div>
    </header>

    <!-- Sidebar (desktop) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebar-avatar"></div>
          <div class="sidebar-user-info">
            <strong id="sidebar-name"></strong>
            <small id="sidebar-role"></small>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="app.logout()">🚪 Cerrar Sesión</button>
      </div>
    </aside>

    <!-- Sidebar overlay -->
    <div class="sidebar-overlay hidden" id="sidebar-overlay" onclick="app.closeSidebar()"></div>

    <!-- Main Content -->
    <main class="app-main" id="app-main">
      <div id="view-container" class="view-container"></div>
    </main>

    <!-- Bottom Navigation (mobile) -->
    <nav class="bottom-nav" id="bottom-nav"></nav>

  </div>

  <!-- ===== MODAL ===== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box" id="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" onclick="app.closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ===== INSTALL PROMPT ===== -->
  <div id="install-banner" class="install-banner hidden">
    <span>📲 Instalar Gym Trainer</span>
    <div>
      <button class="btn btn-sm btn-primary" id="install-btn">Instalar</button>
      <button class="btn btn-sm btn-ghost" id="install-dismiss">Después</button>
    </div>
  </div>

  <!-- Chart.js como script normal (necesario antes del módulo) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- App como ES Module (importa Firebase + data.js automáticamente) -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
